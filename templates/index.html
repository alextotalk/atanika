<!DOCTYPE html>
<html lang="en">
<head>

    <title>HTMX Example</title>

    <script src="https://unpkg.com/htmx@4.2.1/dist/htmx.min.js"></script>
</head>
<body>
<h1>HTMX Example</h1>

<ul id="userList">

        {{ .Users }}

</ul>

</body>
</html>
